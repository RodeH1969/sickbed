<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sick Bed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #F7F4EE;
    --linen-dim: #EEEAE0;
    --ink: #2B3A2E;
    --ink-soft: #5C6B5E;
    --coral: #E8786B;
    --coral-dim: #F0B5AC;
    --line: #DCD6C8;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--linen);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 760px; margin: 0 auto; padding: 0 28px; }

  /* ---------- NAV ---------- */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 26px 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .brand-icon {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 0 2px var(--linen), 0 0 0 3px var(--line);
  }
  .wordmark {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .wordmark span { color: var(--coral); position: relative; top: 0.12em; }
  .nav-links {
    display: flex;
    gap: 28px;
    align-items: center;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .nav-links a { color: var(--ink-soft); text-decoration: none; }

  /* ---------- MASTHEAD ---------- */
  .masthead {
    text-align: center;
    padding: 18px 0 28px;
    border-bottom: 3px double var(--ink);
  }
  .masthead .kicker {
    font-size: 11.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 32px;
    letter-spacing: -0.01em;
  }
  .masthead .dateline {
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-top: 8px;
    font-style: italic;
  }

  .search-bar {
    display: flex;
    gap: 10px;
    margin: 26px 0;
  }
  .search-bar input {
    flex: 1;
    padding: 13px 16px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--white);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
  }
  .search-bar input::placeholder { color: #A8A296; }
  .search-bar button {
    padding: 13px 22px;
    background: var(--ink);
    color: var(--linen);
    border: none;
    border-radius: 3px;
    font-size: 14.5px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  /* ---------- NOTICES DIRECTORY ---------- */
  .notices { padding-bottom: 50px; }

  .suburb-group { margin-bottom: 8px; }
  .suburb-heading {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    background: var(--linen-dim);
    padding: 9px 14px;
    border-radius: 3px 3px 0 0;
    border: 1px solid var(--line);
    border-bottom: none;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .suburb-heading .suburb-count {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .notice-list {
    border: 1px solid var(--line);
    border-radius: 0 0 3px 3px;
    background: var(--white);
    margin-bottom: 22px;
  }
  .notice-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 14px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--linen-dim);
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .notice-row:last-child { border-bottom: none; }
  .notice-row:hover { background: var(--linen-dim); }

  .notice-name {
    font-size: 14.5px;
    flex: 1;
    min-width: 0;
  }
  .notice-name .full {
    font-weight: 500;
  }
  .notice-name .nickname {
    color: var(--ink-soft);
    font-weight: 400;
  }

  .notice-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .notice-illness {
    font-size: 11.5px;
    color: var(--white);
    background: var(--coral);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    white-space: nowrap;
  }
  .notice-days {
    font-size: 11.5px;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .empty-state, .error-state {
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
    padding: 50px 0;
  }

  /* ---------- FOOTER ---------- */
  .closing-note {
    border-top: 1px solid var(--line);
    padding: 30px 0 36px;
    max-width: 480px;
  }
  .closing-note p {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  footer {
    border-top: 1px solid var(--line);
    padding: 22px 0 30px;
    display: flex;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--ink-soft);
  }
  footer a { color: var(--ink-soft); text-decoration: none; margin-left: 18px; }
  .footer-list-link { opacity: 0.7; }

  @media (max-width: 600px) {
    .masthead h1 { font-size: 26px; }
    .notice-row { flex-wrap: wrap; }
  }

  /* ---------- PERSON MODAL ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(43,58,46,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .modal-card {
    background: var(--white);
    border-radius: 16px;
    max-width: 420px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(43,58,46,0.08);
    border: none;
    color: var(--ink);
    font-size: 16px;
    cursor: pointer;
    z-index: 2;
  }
  .modal-photo {
    width: 100%;
    height: 220px;
    background-size: cover;
    background-position: center;
    border-radius: 16px 16px 0 0;
  }
  .modal-body { padding: 22px 24px 26px; }
  .modal-name {
    font-family: 'Fraunces', serif;
    font-size: 21px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .modal-name .nickname { color: var(--ink-soft); font-weight: 400; font-size: 16px; }
  .modal-loc { font-size: 13.5px; color: var(--ink-soft); margin-bottom: 12px; }
  .modal-illness {
    display: inline-block;
    font-size: 12px;
    color: var(--white);
    background: var(--coral);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    margin-bottom: 18px;
  }
  .modal-section-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink-soft);
    font-weight: 700;
    margin: 18px 0 12px;
  }
  .modal-wishlist {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-wishlist-item {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .modal-wishlist-item img { width: 100%; height: 64px; object-fit: contain; margin-bottom: 6px; }
  .modal-wishlist-item .mwi-name { font-size: 11.5px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .modal-wishlist-item .mwi-price { font-size: 11.5px; color: var(--ink-soft); margin-bottom: 8px; }
  .modal-wishlist-item button {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 20px;
    background: var(--ink);
    color: var(--linen);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .modal-no-wishlist {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .modal-cta {
    display: block;
    width: 100%;
    text-align: center;
    margin-top: 18px;
    padding: 14px;
    border-radius: 30px;
    background: var(--coral);
    color: var(--white);
    font-size: 14.5px;
    font-weight: 700;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="wrap">

  <nav>
    <div class="brand">
      <img src="assets/sickbed-icon.png" class="brand-icon" alt="">
      <div class="wordmark">sick<span>bed</span></div>
    </div>
    <div class="nav-links">
      <a href="sickbed-list.html">Not feeling well?</a>
    </div>
  </nav>

  <div class="masthead">
    <div class="kicker">Today's notices</div>
    <h1>Who's under the weather</h1>
    <div class="dateline" id="dateline"></div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search a name or suburb — try Ashgrove">
    <button id="searchBtn">Search</button>
  </div>

  <div class="notices" id="notices">
    <div class="empty-state">Loading…</div>
  </div>

  <div class="closing-note">
    <p>See someone you know? They likely won't say it out loud — but a little something on the doorstep says you noticed anyway.</p>
  </div>

  <footer>
    <span>Sick Bed · Brisbane</span>
    <div>
      <a href="#">Privacy</a>
      <a href="#">Contact</a>
      <a href="sickbed-list.html" class="footer-list-link">Not feeling well yourself?</a>
    </div>
  </footer>

</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-card" id="modalCard">
    <!-- filled in by JS -->
  </div>
</div>

<script>
  const notices = document.getElementById('notices');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const dateline = document.getElementById('dateline');

  dateline.textContent = new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function renderNotices(listings) {
    if (!listings.length) {
      notices.innerHTML = '<div class="empty-state">No notices today — check back soon.</div>';
      return;
    }

    // Group by suburb
    const groups = {};
    listings.forEach(listing => {
      const suburb = listing.suburb || 'Unknown';
      if (!groups[suburb]) groups[suburb] = [];
      groups[suburb].push(listing);
    });

    // Suburbs alphabetically, people within each suburb most-recent first (API already orders this way)
    const suburbs = Object.keys(groups).sort((a, b) => a.localeCompare(b));

    notices.innerHTML = suburbs.map(suburb => {
      const people = groups[suburb];
      const rows = people.map(p => {
        const fullName = escapeHtml(p.fullName || '');
        const nickname = p.nickname ? `<span class="nickname"> (${escapeHtml(p.nickname)})</span>` : '';
        const illnessTag = p.illness ? `<span class="notice-illness">${escapeHtml(p.illness)}</span>` : '';
        const daysLabel = `${p.daysLeft} day${p.daysLeft === 1 ? '' : 's'} left`;
        return `
          <div class="notice-row" data-listing-id="${escapeHtml(p.id)}" role="button" tabindex="0">
            <span class="notice-name"><span class="full">${fullName}</span>${nickname}</span>
            <span class="notice-right">
              ${illnessTag}
              <span class="notice-days">${daysLabel}</span>
            </span>
          </div>
        `;
      }).join('');

      return `
        <div class="suburb-group">
          <div class="suburb-heading">
            <span>${escapeHtml(suburb)}</span>
            <span class="suburb-count">${people.length} ${people.length === 1 ? 'notice' : 'notices'}</span>
          </div>
          <div class="notice-list">${rows}</div>
        </div>
      `;
    }).join('');

    // store latest listings in memory so the modal can look up full details (incl. wishlist) without a refetch
    window.__listingsById = {};
    listings.forEach(p => { window.__listingsById[p.id] = p; });

    notices.querySelectorAll('.notice-row').forEach(row => {
      row.addEventListener('click', () => openModal(row.dataset.listingId));
      row.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openModal(row.dataset.listingId);
        }
      });
    });
  }

  async function loadListings(query) {
    try {
      const url = query ? `/api/listings?q=${encodeURIComponent(query)}` : '/api/listings';
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to load listings');
      const listings = await res.json();
      renderNotices(listings);
    } catch (err) {
      console.error(err);
      notices.innerHTML = '<div class="error-state">Couldn\'t load notices right now.</div>';
    }
  }

  function runSearch() {
    loadListings(searchInput.value.trim());
  }

  searchBtn.addEventListener('click', runSearch);
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') runSearch();
  });
  searchInput.addEventListener('input', () => {
    clearTimeout(window.__searchDebounce);
    window.__searchDebounce = setTimeout(runSearch, 250);
  });

  // ---------- Person modal ----------
  const modalBackdrop = document.getElementById('modalBackdrop');
  const modalCard = document.getElementById('modalCard');

  function openModal(listingId) {
    const p = window.__listingsById && window.__listingsById[listingId];
    if (!p) return;

    const fullName = escapeHtml(p.fullName || '');
    const nicknameHtml = p.nickname ? `<span class="nickname"> (${escapeHtml(p.nickname)})</span>` : '';
    const illnessHtml = p.illness ? `<div class="modal-illness">${escapeHtml(p.illness)}</div>` : '';
    const photoStyle = p.photoUrl ? `background-image:url('${p.photoUrl}')` : 'background:var(--linen-dim)';

    let wishlistHtml;
    if (p.wishlist && p.wishlist.length) {
      wishlistHtml = `
        <div class="modal-section-label">Things they'd love right now</div>
        <div class="modal-wishlist">
          ${p.wishlist.map(item => `
            <div class="modal-wishlist-item">
              <img src="${escapeHtml(item.img)}" alt="${escapeHtml(item.name)}">
              <div class="mwi-name">${escapeHtml(item.name)}</div>
              <div class="mwi-price">$${item.price.toFixed(2)}</div>
              <button type="button" data-key="${escapeHtml(item.key)}">Send this</button>
            </div>
          `).join('')}
        </div>
      `;
    } else {
      wishlistHtml = `<div class="modal-no-wishlist">They haven't picked anything specific — you can still send a little something.</div>
        <a class="modal-cta" href="sickbed-gift.html?listingId=${encodeURIComponent(p.id)}&name=${encodeURIComponent(p.nickname || p.fullName)}&loc=${encodeURIComponent(p.suburb)}">Send a gift</a>`;
    }

    modalCard.innerHTML = `
      <button class="modal-close" id="modalCloseBtn" aria-label="Close">✕</button>
      <div class="modal-photo" style="${photoStyle}"></div>
      <div class="modal-body">
        <div class="modal-name">${fullName}${nicknameHtml}</div>
        <div class="modal-loc">${escapeHtml(p.suburb)}</div>
        ${illnessHtml}
        ${wishlistHtml}
      </div>
    `;

    modalCard.querySelectorAll('.modal-wishlist-item button').forEach(btn => {
      btn.addEventListener('click', () => {
        const url = `sickbed-gift.html?listingId=${encodeURIComponent(p.id)}&name=${encodeURIComponent(p.nickname || p.fullName)}&loc=${encodeURIComponent(p.suburb)}&item=${encodeURIComponent(btn.dataset.key)}`;
        window.location.href = url;
      });
    });

    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    modalBackdrop.classList.add('open');
  }

  function closeModal() {
    modalBackdrop.classList.remove('open');
  }

  modalBackdrop.addEventListener('click', (e) => {
    if (e.target === modalBackdrop) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  loadListings();
</script>

</body>
</html>
