<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — Sick Bed Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #F7F4EE;
    --linen-dim: #EEEAE0;
    --ink: #2B3A2E;
    --ink-soft: #5C6B5E;
    --coral: #E8786B;
    --line: #DCD6C8;
    --white: #FFFFFF;
    --green: #5C8A5C;
    --amber: #C99A3E;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--linen);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 24px 60px; }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand-logo { height: 84px; width: auto; display: block; }
  .admin-tag {
    font-size: 11.5px;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    padding: 3px 9px;
    border-radius: 3px;
  }

  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
  }
  .filter-btn {
    border: 1px solid var(--line);
    background: var(--white);
    padding: 7px 14px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink-soft);
  }
  .filter-btn.active { border-color: var(--ink); color: var(--ink); font-weight: 600; }

  .order-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .order-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--linen-dim);
  }
  .order-id { font-size: 12px; color: var(--ink-soft); font-family: 'Inter', monospace; }
  .status-pill {
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 12px;
  }
  .status-pill.new { background: #FCE9D9; color: var(--amber); }
  .status-pill.actioned { background: #E1ECDD; color: var(--green); }

  .order-body { padding: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .order-col h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .order-row { font-size: 14px; margin-bottom: 6px; line-height: 1.5; }
  .order-row strong { font-weight: 600; }
  .note-box {
    background: var(--linen-dim);
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 13.5px;
    font-style: italic;
    color: var(--ink);
    line-height: 1.5;
    margin-top: 4px;
  }
  .address-box {
    background: #FCF2EF;
    border: 1px solid var(--coral);
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 600;
    margin-top: 4px;
  }

  .order-foot {
    border-top: 1px solid var(--line);
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .order-total { font-size: 13.5px; color: var(--ink-soft); }
  .order-total strong { color: var(--ink); }
  .mark-btn {
    background: var(--ink);
    color: var(--linen);
    border: none;
    padding: 9px 16px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .mark-btn.done { background: var(--linen-dim); color: var(--ink-soft); cursor: default; }

  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--ink-soft);
    font-size: 14px;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .tab-btn {
    border: none;
    background: none;
    padding: 10px 4px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab-btn.active { color: var(--ink); border-bottom-color: var(--coral); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .listing-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .listing-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--coral);
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: rgba(255,255,255,0.9);
  }
  .listing-info { flex: 1; min-width: 0; }
  .listing-name { font-size: 14.5px; font-weight: 600; }
  .listing-name .nickname { color: var(--ink-soft); font-weight: 400; }
  .listing-meta { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }
  .listing-illness {
    display: inline-block;
    font-size: 11px;
    color: var(--white);
    background: var(--coral);
    padding: 2px 9px;
    border-radius: 20px;
    font-weight: 600;
    margin-top: 5px;
  }
  .listing-days {
    font-size: 12px;
    color: var(--ink-soft);
    flex-shrink: 0;
  }
  .delete-btn {
    background: var(--white);
    color: var(--coral);
    border: 1px solid var(--coral);
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  .delete-btn:hover { background: var(--coral); color: var(--white); }
  .delete-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="wrap">
  <nav>
    <div class="brand">
      <img src="assets/sickbedlogo2.png" class="brand-logo" alt="Sick Bed">
    </div>
    <div class="admin-tag">Admin — orders</div>
  </nav>

  <div class="tabs">
    <button class="tab-btn active" data-tab="orders">Orders</button>
    <button class="tab-btn" data-tab="listings">Listings</button>
  </div>

  <div class="tab-panel active" id="ordersPanel">
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="new">New</button>
      <button class="filter-btn" data-filter="actioned">Actioned</button>
    </div>

    <div id="orderList"></div>
    <div class="empty-state" id="emptyState" style="display:none">No orders here yet.</div>
  </div>

  <div class="tab-panel" id="listingsPanel">
    <div id="listingList"></div>
    <div class="empty-state" id="listingsEmptyState" style="display:none">No listings here yet.</div>
  </div>

</div>

<script>
  let orders = [];
  let listings = [];

  const orderList = document.getElementById('orderList');
  const emptyState = document.getElementById('emptyState');
  const filterBtns = document.querySelectorAll('.filter-btn');
  let currentFilter = 'all';

  const tabBtns = document.querySelectorAll('.tab-btn');
  const ordersPanel = document.getElementById('ordersPanel');
  const listingsPanel = document.getElementById('listingsPanel');

  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const isOrders = btn.dataset.tab === 'orders';
      ordersPanel.classList.toggle('active', isOrders);
      listingsPanel.classList.toggle('active', !isOrders);
      document.querySelector('.admin-tag').textContent = isOrders ? 'Admin — orders' : 'Admin — listings';
    });
  });

  function render() {
    const filtered = orders.filter(o => currentFilter === 'all' || o.status === currentFilter);
    orderList.innerHTML = '';
    emptyState.style.display = filtered.length ? 'none' : 'block';

    filtered.forEach(o => {
      const card = document.createElement('div');
      card.className = 'order-card';
      card.innerHTML = `
        <div class="order-head">
          <span class="order-id">${o.id} · ${o.placed}</span>
          <span class="status-pill ${o.status}">${o.status === 'new' ? 'Needs actioning' : 'Actioned'}</span>
        </div>
        <div class="order-body">
          <div class="order-col">
            <h4>Deliver to</h4>
            <div class="order-row"><strong>${o.recipientName}</strong> — ${o.suburb}</div>
            <div class="address-box">${o.address || 'Address collected separately'}</div>
          </div>
          <div class="order-col">
            <h4>Gift &amp; note</h4>
            <div class="order-row"><strong>${o.gift}</strong></div>
            <div class="note-box">"${o.note}"</div>
          </div>
        </div>
        <div class="order-foot">
          <span class="order-total">From <strong>${o.sender}</strong> · <strong>${o.total}</strong></span>
          <button class="mark-btn ${o.status === 'actioned' ? 'done' : ''}" data-id="${o.id}">
            ${o.status === 'actioned' ? 'Done' : 'Mark as actioned'}
          </button>
        </div>
      `;
      orderList.appendChild(card);
    });

    document.querySelectorAll('.mark-btn:not(.done)').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        try {
          const res = await fetch(`/api/orders/${btn.dataset.id}/action`, { method: 'POST' });
          if (!res.ok) throw new Error('Failed to update order');
          const order = orders.find(o => o.id === btn.dataset.id);
          order.status = 'actioned';
          render();
        } catch (err) {
          btn.disabled = false;
          console.error(err);
        }
      });
    });
  }

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  async function loadOrders() {
    try {
      const res = await fetch('/api/orders');
      if (!res.ok) throw new Error('Failed to load orders');
      orders = await res.json();
      render();
    } catch (err) {
      console.error(err);
      emptyState.textContent = "Couldn't load orders right now.";
      emptyState.style.display = 'block';
    }
  }

  // ---------- Listings tab ----------
  const listingList = document.getElementById('listingList');
  const listingsEmptyState = document.getElementById('listingsEmptyState');

  function renderListings() {
    listingList.innerHTML = '';
    listingsEmptyState.style.display = listings.length ? 'none' : 'block';

    listings.forEach(l => {
      const card = document.createElement('div');
      card.className = 'listing-card';
      const avatarStyle = l.photoUrl ? `background-image:url('${l.photoUrl}')` : '';
      const avatarInitial = l.photoUrl ? '' : (l.fullName || l.nickname || '?').charAt(0);
      const illnessHtml = l.illness ? `<div class="listing-illness">${l.illness}</div>` : '';

      card.innerHTML = `
        <div class="listing-avatar" style="${avatarStyle}">${avatarInitial}</div>
        <div class="listing-info">
          <div class="listing-name">${l.fullName}${l.nickname ? ` <span class="nickname">(${l.nickname})</span>` : ''}</div>
          <div class="listing-meta">${l.suburb}${l.address ? ' — ' + l.address : ''}</div>
          ${illnessHtml}
        </div>
        <div class="listing-days">${l.daysLeft} day${l.daysLeft === 1 ? '' : 's'} left</div>
        <button class="delete-btn" data-id="${l.id}">Delete</button>
      `;
      listingList.appendChild(card);
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Remove this listing? This cannot be undone.')) return;
        btn.disabled = true;
        btn.textContent = 'Removing…';
        try {
          const res = await fetch(`/api/listings/${btn.dataset.id}`, { method: 'DELETE' });
          if (!res.ok) throw new Error('Failed to delete listing');
          listings = listings.filter(l => l.id !== btn.dataset.id);
          renderListings();
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Delete';
          console.error(err);
          alert("Couldn't remove that listing — please try again.");
        }
      });
    });
  }

  async function loadListings() {
    try {
      const res = await fetch('/api/listings?admin=true');
      if (!res.ok) throw new Error('Failed to load listings');
      listings = await res.json();
      renderListings();
    } catch (err) {
      console.error(err);
      listingsEmptyState.textContent = "Couldn't load listings right now.";
      listingsEmptyState.style.display = 'block';
    }
  }

  loadOrders();
  loadListings();
</script>

</body>
</html>
