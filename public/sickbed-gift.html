<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send something — Sick Bed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #F7F4EE;
    --linen-dim: #EEEAE0;
    --ink: #2B3A2E;
    --ink-soft: #5C6B5E;
    --coral: #E8786B;
    --coral-dim: #F0B5AC;
    --line: #DCD6C8;
    --white: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--linen);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 0 24px 60px; }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 26px 0;
    max-width: 520px;
    margin: 0 auto;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 0 2px var(--linen), 0 0 0 3px var(--line);
  }
  .wordmark { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
  .wordmark span { color: var(--coral); position: relative; top: 0.12em; }
  .back-link { font-size: 13.5px; color: var(--ink-soft); text-decoration: none; }

  .who {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 0 26px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 26px;
  }
  .who-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--coral);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: rgba(255,255,255,0.9);
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
  }
  .who-text h2 {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 500;
  }
  .who-text p { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
  .who-illness {
    display: inline-block;
    font-size: 11px;
    color: var(--white);
    background: var(--coral);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    margin-top: 6px;
  }

  .section-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }

  .gift-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .gift-card {
    border: 1.5px solid var(--line);
    border-radius: 6px;
    padding: 12px 12px 14px;
    text-align: center;
    cursor: pointer;
    background: var(--white);
    transition: border-color 0.15s ease;
  }
  .gift-card.selected { border-color: var(--coral); background: #FCF2EF; }
  .gift-photo {
    width: 100%;
    height: 92px;
    object-fit: contain;
    margin-bottom: 8px;
  }
  .gift-card h3 { font-size: 12.5px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
  .gift-card .price { font-size: 12px; color: var(--ink-soft); }

  .no-wishlist-note {
    background: var(--linen-dim);
    border-radius: 6px;
    padding: 16px 18px;
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .field { margin-bottom: 22px; }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .field textarea, .field input {
    width: 100%;
    padding: 13px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--white);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    resize: none;
  }
  .field textarea { height: 100px; line-height: 1.5; }
  .field-hint { font-size: 11.5px; color: var(--ink-soft); margin-top: 5px; }

  .card-preview {
    background: #FCF2EF;
    border: 1.5px dashed var(--coral);
    border-radius: 6px;
    padding: 22px 22px 20px;
    margin-bottom: 24px;
    font-family: 'Fraunces', serif;
  }
  .card-preview p {
    font-size: 15.5px;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .card-preview p:last-child { margin-bottom: 0; }
  .card-preview .preview-note { font-style: italic; color: var(--ink-soft); }
  .card-preview .preview-items { font-family: 'Inter', sans-serif; font-size: 12.5px; color: var(--ink-soft); }

  .privacy-note {
    background: var(--linen-dim);
    border-radius: 4px;
    padding: 16px 18px;
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.6;
    margin-bottom: 26px;
  }
  .privacy-note strong { color: var(--ink); font-weight: 600; }

  .order-summary {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 16px 0;
    margin-bottom: 24px;
  }
  .order-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
  .order-row.total { font-weight: 600; margin-top: 4px; margin-bottom: 0; }
  .order-row span:last-child { color: var(--ink-soft); }
  .order-row.total span:last-child { color: var(--ink); }

  .pay-btn {
    width: 100%;
    background: var(--coral);
    color: var(--white);
    border: none;
    padding: 16px;
    border-radius: 4px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
  }
  .pay-btn:disabled { background: var(--coral-dim); cursor: not-allowed; }

  .thankyou-note {
    text-align: center;
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-top: 16px;
    line-height: 1.6;
  }

  .loading-state, .error-state {
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
    padding: 60px 0;
  }
</style>
</head>
<body>

<nav>
  <div class="brand">
    <img src="assets/sickbed-icon.png" class="brand-icon" alt="">
    <div class="wordmark">sick<span>bed</span></div>
  </div>
  <a href="sickbed-landing.html" class="back-link">← Back</a>
</nav>

<div class="wrap" id="pageWrap">
  <div class="loading-state">Loading…</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const listingId = params.get('listingId') || '';
  const preselectKey = params.get('item') || '';
  const fallbackName = params.get('name') || 'Someone special';
  const fallbackLoc = params.get('loc') || 'Brisbane';
  const DELIVERY_FEE = 5;

  const pageWrap = document.getElementById('pageWrap');

  function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderPage(listing) {
    const displayName = listing.nickname || listing.fullName || fallbackName;
    const suburb = listing.suburb || fallbackLoc;
    const photoStyle = listing.photoUrl ? `background-image:url('${listing.photoUrl}')` : '';
    const illnessHtml = listing.illness ? `<div class="who-illness">${escapeHtml(listing.illness)}</div>` : '';
    const wishlist = listing.wishlist || [];

    const giftOptionsHtml = wishlist.length
      ? wishlist.map((item, i) => `
          <div class="gift-card${i === 0 && !preselectKey ? ' selected' : ''}${item.key === preselectKey ? ' selected' : ''}"
               data-key="${escapeHtml(item.key)}" data-price="${item.price}" data-name="${escapeHtml(item.name)}">
            <img src="${escapeHtml(item.img)}" class="gift-photo" alt="${escapeHtml(item.name)}">
            <h3>${escapeHtml(item.name)}</h3>
            <div class="price">$${item.price.toFixed(2)}</div>
          </div>
        `).join('')
      : '';

    pageWrap.innerHTML = `
      <div class="who">
        <div class="who-avatar" id="whoAvatar" style="${photoStyle}">${photoStyle ? '' : escapeHtml(displayName.charAt(0))}</div>
        <div class="who-text">
          <h2>${escapeHtml(displayName)}</h2>
          <p>${escapeHtml(suburb)}</p>
          ${illnessHtml}
        </div>
      </div>

      ${wishlist.length ? `
        <div class="section-label">Things they'd love right now</div>
        <div class="gift-options" id="giftOptions">${giftOptionsHtml}</div>
        <p class="field-hint" style="margin-bottom:28px;">Tap to add more than one — they'll all arrive together.</p>
      ` : `
        <div class="no-wishlist-note">${escapeHtml(displayName)} hasn't picked anything specific yet — check back soon, or send a note for now and arrange something separately.</div>
      `}

      <div class="field">
        <label for="sender">From</label>
        <input type="text" id="sender" placeholder="How you'd like to sign it">
      </div>

      <div class="field">
        <label for="note">Your note</label>
        <textarea id="note" placeholder="Hope this makes you feel better. Love x"></textarea>
        <div class="field-hint">This is sent straight to them as a card through Sick Bed — nothing printed, nothing inside the delivery.</div>
      </div>

      ${wishlist.length ? `
        <div class="section-label">What they'll receive</div>
        <div class="card-preview" id="cardPreview">
          <p><strong id="previewSender">Someone</strong> sent you this because they heard you're not well.</p>
          <p class="preview-note" id="previewNote">Hope this makes you feel better. Love x</p>
          <p class="preview-items">A <span id="previewItems"></span> is on its way.</p>
        </div>
      ` : ''}

      <div class="privacy-note">
        We already know where to find <strong>${escapeHtml(displayName)}</strong>. Your message arrives the moment you hit send — and not long after, something good turns up at their door.
      </div>

      ${wishlist.length ? `
        <div class="order-summary">
          <div class="order-row"><span id="summaryGift">Nothing selected yet</span><span id="summaryPrice">$0.00</span></div>
          <div class="order-row"><span>Delivery &amp; service</span><span>$${DELIVERY_FEE.toFixed(2)}</span></div>
          <div class="order-row total"><span>Total</span><span id="summaryTotal">$0.00</span></div>
        </div>
      ` : ''}

      <button class="pay-btn" id="payBtn" disabled>${wishlist.length ? 'Pay and send' : 'Send note'}</button>
      <p class="thankyou-note">They may send a thank-you note back once it arrives — entirely up to them, never required.</p>
    `;

    wireUpInteractions(listing);
  }

  function wireUpInteractions(listing) {
    const displayName = listing.nickname || listing.fullName || fallbackName;
    const suburb = listing.suburb || fallbackLoc;
    const wishlist = listing.wishlist || [];

    const cards = document.querySelectorAll('.gift-card');
    const summaryGift = document.getElementById('summaryGift');
    const summaryPrice = document.getElementById('summaryPrice');
    const summaryTotal = document.getElementById('summaryTotal');
    const senderInput = document.getElementById('sender');
    const noteInput = document.getElementById('note');
    const previewSender = document.getElementById('previewSender');
    const previewNote = document.getElementById('previewNote');
    const previewItems = document.getElementById('previewItems');
    const payBtn = document.getElementById('payBtn');
    const thankyouNote = document.querySelector('.thankyou-note');

    function getSelected() {
      return Array.from(cards).filter(c => c.classList.contains('selected'));
    }

    function formatItemList(names) {
      if (names.length === 0) return 'something';
      if (names.length === 1) return names[0].toLowerCase();
      return names.slice(0, -1).join(', ').toLowerCase() + ' and ' + names[names.length - 1].toLowerCase();
    }

    function updateSummary() {
      if (!wishlist.length) {
        payBtn.disabled = senderInput.value.trim().length === 0;
        return;
      }
      const selected = getSelected();
      const total = selected.reduce((sum, c) => sum + parseFloat(c.dataset.price), 0);
      const names = selected.map(c => c.querySelector('h3').textContent);

      summaryGift.textContent = names.length ? names.join(' + ') : 'Nothing selected yet';
      summaryPrice.textContent = '$' + total.toFixed(2);
      summaryTotal.textContent = '$' + (total + (selected.length ? DELIVERY_FEE : 0)).toFixed(2);
      if (previewItems) previewItems.textContent = formatItemList(names);

      payBtn.disabled = selected.length === 0 || senderInput.value.trim().length === 0;
    }

    function updatePreview() {
      if (previewSender) previewSender.textContent = senderInput.value.trim() || 'Add your name above';
      if (previewNote) previewNote.textContent = noteInput.value.trim() || 'Hope this makes you feel better. Love x';
      updateSummary();
    }

    cards.forEach(card => {
      card.addEventListener('click', () => {
        card.classList.toggle('selected');
        if (wishlist.length && getSelected().length === 0) card.classList.add('selected');
        updateSummary();
      });
    });

    senderInput.addEventListener('input', updatePreview);
    noteInput.addEventListener('input', updatePreview);

    updateSummary();
    updatePreview();

    payBtn.addEventListener('click', async () => {
      const selected = getSelected();
      if (wishlist.length && !selected.length) return;
      if (!senderInput.value.trim()) return;

      payBtn.disabled = true;
      payBtn.textContent = wishlist.length ? 'Sending…' : 'Sending note…';

      const total = selected.reduce((sum, c) => sum + parseFloat(c.dataset.price), 0) + (selected.length ? DELIVERY_FEE : 0);

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            listingId,
            recipientName: displayName,
            recipientSuburb: suburb,
            items: selected.map(c => ({ key: c.dataset.key, name: c.dataset.name, price: parseFloat(c.dataset.price) })),
            sender: senderInput.value.trim(),
            note: noteInput.value.trim(),
            deliveryFee: selected.length ? DELIVERY_FEE : 0,
            total
          })
        });

        if (!res.ok) throw new Error('Order failed');

        payBtn.textContent = 'Sent ✓';
        thankyouNote.textContent = "Done — they'll be sorted soon. Thank you for thinking of them.";
      } catch (err) {
        payBtn.textContent = wishlist.length ? 'Pay and send' : 'Send note';
        payBtn.disabled = false;
        thankyouNote.textContent = 'Something went wrong sending that — please try again.';
        console.error(err);
      }
    });
  }

  async function loadListing() {
    if (!listingId) {
      renderPage({ fullName: fallbackName, nickname: '', suburb: fallbackLoc, wishlist: [] });
      return;
    }
    try {
      const res = await fetch(`/api/listings/${encodeURIComponent(listingId)}`);
      if (!res.ok) throw new Error('Failed to load listing');
      const listing = await res.json();
      renderPage(listing);
    } catch (err) {
      console.error(err);
      pageWrap.innerHTML = '<div class="error-state">Couldn\'t load this listing — they may have already been listed for 7 days, or the link is broken.</div>';
    }
  }

  loadListing();
</script>

</body>
</html>
